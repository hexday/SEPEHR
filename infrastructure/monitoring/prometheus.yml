# SEPEHR — Prometheus Configuration

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: "sepehr"
    environment: "production"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "rules/*.yml"

scrape_configs:
  # Backend FastAPI metrics
  - job_name: "sepehr-backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: "/metrics"
    scrape_interval: 15s

  # PostgreSQL metrics (via postgres_exporter)
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # Redis metrics (via redis_exporter)
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  # Nginx metrics (via nginx-prometheus-exporter)
  - job_name: "nginx"
    static_configs:
      - targets: ["nginx-exporter:9113"]

  # Node/host metrics (via node_exporter)
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
