# SEPEHR — Prometheus Alert Rules

groups:
  - name: sepehr.availability
    interval: 30s
    rules:
      - alert: BackendDown
        expr: up{job="sepehr-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "SEPEHR backend is down"
          description: "The SEPEHR API backend has been unreachable for more than 1 minute."

      - alert: HighErrorRate
        expr: >
          rate(http_requests_total{job="sepehr-backend",status=~"5.."}[5m])
          / rate(http_requests_total{job="sepehr-backend"}[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP error rate"
          description: "More than 5% of requests are returning 5xx errors."

      - alert: HighLatency
        expr: >
          histogram_quantile(0.95,
            rate(http_request_duration_seconds_bucket{job="sepehr-backend"}[5m])
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API latency"
          description: "95th percentile response time exceeds 2 seconds."

  - name: sepehr.database
    rules:
      - alert: PostgresDown
        expr: up{job="postgres"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"

      - alert: PostgresHighConnections
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connection count is high"
          description: "Currently {{ $value }} active connections."

  - name: sepehr.redis
    rules:
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"

      - alert: RedisHighMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage above 90%"

  - name: sepehr.system
    rules:
      - alert: HighCpuUsage
        expr: 100 - (avg by(instance)(irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "CPU usage above 85%"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Memory usage above 90%"

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Less than 15% disk space remaining"
