# SEPEHR — Nginx Main Configuration

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100;
    types_hash_max_size 2048;
    server_tokens off;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff
        font/woff2;

    # ── Buffers ───────────────────────────────────────────────────────────────
    client_body_buffer_size 10K;
    client_header_buffer_size 1k;
    client_max_body_size 55M;
    large_client_header_buffers 2 1k;

    # ── Timeouts ──────────────────────────────────────────────────────────────
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;

    # ── Rate Limiting Zones ───────────────────────────────────────────────────
    # Auth endpoints: strict (10 req/min per IP)
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    # API endpoints: moderate (100 req/min per IP)
    limit_req_zone $binary_remote_addr zone=api:20m rate=100r/m;
    # Upload endpoints: strict (30 req/min per IP)
    limit_req_zone $binary_remote_addr zone=upload:10m rate=30r/m;

    limit_req_status 429;
    limit_conn_zone $binary_remote_addr zone=addr:10m;
    limit_conn addr 20;

    # ── Upstream Backends ─────────────────────────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:3000;
        keepalive 16;
    }

    # ── HTTP → HTTPS Redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Allow Let's Encrypt ACME challenges
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Main HTTPS Server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name _;

        # ── TLS ───────────────────────────────────────────────────────────────
        ssl_certificate /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/${DOMAIN}/chain.pem;

        ssl_protocols TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_stapling on;
        ssl_stapling_verify on;

        # ── Security Headers ──────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(self), geolocation=(self), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' wss:; media-src 'self'; object-src 'none'; frame-ancestors 'none';" always;

        # ── API Proxy ─────────────────────────────────────────────────────────
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://backend;
            include /etc/nginx/snippets/proxy-params.conf;
        }

        location ~ ^/api/v1/messenger/conversations/[^/]+/messages/media {
            limit_req zone=upload burst=5 nodelay;
            client_max_body_size 55M;
            proxy_pass http://backend;
            include /etc/nginx/snippets/proxy-params.conf;
            proxy_read_timeout 120s;
        }

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend;
            include /etc/nginx/snippets/proxy-params.conf;
        }

        # ── WebSocket ─────────────────────────────────────────────────────────
        location /ws {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── Health check (no rate limit) ──────────────────────────────────────
        location = /api/health {
            proxy_pass http://backend;
            include /etc/nginx/snippets/proxy-params.conf;
            access_log off;
        }

        # ── Metrics (internal only) ───────────────────────────────────────────
        location = /metrics {
            allow 127.0.0.1;
            allow 172.28.0.0/16;
            deny all;
            proxy_pass http://backend;
            include /etc/nginx/snippets/proxy-params.conf;
            access_log off;
        }

        # ── Static assets (Next.js) ───────────────────────────────────────────
        location /_next/static/ {
            proxy_pass http://frontend;
            include /etc/nginx/snippets/proxy-params.conf;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location /icons/ {
            proxy_pass http://frontend;
            include /etc/nginx/snippets/proxy-params.conf;
            expires 30d;
            access_log off;
        }

        # Service worker — no cache
        location = /sw.js {
            proxy_pass http://frontend;
            include /etc/nginx/snippets/proxy-params.conf;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # ── Frontend (catch-all) ──────────────────────────────────────────────
        location / {
            proxy_pass http://frontend;
            include /etc/nginx/snippets/proxy-params.conf;
        }
    }
}
